<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <!--suppress HtmlUnknownTarget -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        .fancy-tabs {
            background-color: #f8f9fa;
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .fancy-tabs .nav-link {
            border-radius: 50px;
            color: #495057;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .fancy-tabs .nav-link:hover {
            background-color: #e9ecef;
        }
        .fancy-tabs .nav-link.active {
            background-color: #212529;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }
        .tab-pane {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">📚 Library Admin</a>
    </div>
</nav>

<div class="container">


    <ul class="nav nav-pills nav-justified mb-4 fancy-tabs" id="appTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="books-tab" data-bs-toggle="pill" data-bs-target="#books-pane" type="button" role="tab">📖 Books Inventory</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="authors-tab" data-bs-toggle="pill" data-bs-target="#authors-pane" type="button" role="tab">✍️ Manage Authors</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="countries-tab" data-bs-toggle="pill" data-bs-target="#countries-pane" type="button" role="tab">🌍 Manage Countries</button>
        </li>
    </ul>

    <div class="tab-content" id="appTabsContent">


        <div class="tab-pane fade show active" id="books-pane" role="tabpanel">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-primary text-white">
                            <h5 class="card-title mb-0" id="formTitle">Add New Book</h5>
                        </div>
                        <div class="card-body">
                            <form id="bookForm">
                                <input type="hidden" id="bookId">
                                <div class="mb-3">
                                    <label for="bookName">Name</label>
                                    <input type="text" id="bookName" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label for="bookCategory">Category</label>
                                    <select id="bookCategory" class="form-select" required>
                                        <option value="NOVEL">NOVEL</option>
                                        <option value="THRILLER">THRILLER</option>
                                        <option value="HISTORY">HISTORY</option>
                                        <option value="FANTASY">FANTASY</option>
                                        <option value="BIOGRAPHY">BIOGRAPHY</option>
                                        <option value="CLASSICS">CLASSICS</option>
                                        <option value="DRAMA">DRAMA</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="bookAuthor">Author</label>
                                    <select id="bookAuthor" class="form-select" required></select>
                                </div>
                                <div class="mb-3">
                                    <label for="bookCopies">Available Copies</label>
                                    <input type="number" id="bookCopies" class="form-control" min="1" required>
                                </div>
                                <div class="mb-3" id="stateDiv" style="display: none;">
                                    <label for="bookState">State</label>
                                    <select id="bookState" class="form-select">
                                        <option value="GOOD">GOOD</option>
                                        <option value="BAD">BAD</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-success w-100 fw-bold" id="saveBtn">Save Book</button>
                                <button type="button" class="btn btn-secondary w-100 mt-2" id="cancelEditBtn" style="display: none;" onclick="resetForm()">Cancel Edit</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <h5 class="card-title mb-0">Book Inventory</h5>
                        </div>
                        <div class="card-body">

                            <div class="mb-4 p-3 bg-light border rounded shadow-sm">
                                <form id="filterForm" class="d-flex align-items-center gap-3 m-0">
                                    <strong>Filter by Book ID:</strong>
                                    <div>
                                        <label for="filterA" class="small text-muted">From</label>
                                        <input type="number" id="filterA" class="form-control form-control-sm" placeholder="From given book ID" required min="1">
                                    </div>
                                    <div>
                                        <label for="filterB" class="small text-muted">To</label>
                                        <input type="number" id="filterB" class="form-control form-control-sm" placeholder="To given book ID" required min="1">
                                    </div>
                                    <div class="d-flex align-items-end mt-3 gap-2">
                                        <button type="submit" class="btn btn-sm btn-info text-white fw-bold">Filter</button>
                                        <button type="button" class="btn btn-sm btn-secondary" onclick="clearFilter()">Clear</button>
                                    </div>
                                </form>
                            </div>

                            <table class="table table-striped table-hover align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Author</th>
                                    <th>Copies</th>
                                    <th>State</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody id="booksTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="tab-pane fade" id="authors-pane" role="tabpanel">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white">
                            <h5 class="card-title mb-0" id="authorFormTitle">Add New Author</h5>
                        </div>
                        <div class="card-body">
                            <form id="authorForm">
                                <input type="hidden" id="authorId">
                                <div class="mb-3">
                                    <label for="authorName">Name</label>
                                    <input type="text" id="authorName" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label for="authorSurname">Surname</label>
                                    <input type="text" id="authorSurname" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label for="authorCountry">Country</label>
                                    <select id="authorCountry" class="form-select" required></select>
                                </div>
                                <button type="submit" class="btn btn-success w-100 fw-bold" id="authorSaveBtn">Save Author</button>
                                <button type="button" class="btn btn-secondary w-100 mt-2" id="authorCancelBtn" style="display: none;" onclick="resetAuthorForm()">Cancel</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white">
                            <h5 class="card-title mb-0">Authors List</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped table-hover align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Surname</th>
                                    <th>Country</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody id="authorsTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="tab-pane fade" id="countries-pane" role="tabpanel">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-info text-white">
                            <h5 class="card-title mb-0" id="countryFormTitle">Add New Country</h5>
                        </div>
                        <div class="card-body">
                            <form id="countryForm">
                                <input type="hidden" id="countryId">
                                <div class="mb-3">
                                    <label for="countryName">Name</label>
                                    <input type="text" id="countryName" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label for="countryContinent">Continent</label>
                                    <input type="text" id="countryContinent" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-info text-white w-100 fw-bold" id="countrySaveBtn">Save Country</button>
                                <button type="button" class="btn btn-secondary w-100 mt-2" id="countryCancelBtn" style="display: none;" onclick="resetCountryForm()">Cancel</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white">
                            <h5 class="card-title mb-0">Countries List</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped table-hover align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Continent</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody id="countriesTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api';

    document.addEventListener("DOMContentLoaded", () => {
        loadCountries();
        loadAuthors();
        loadBooks();
    });

    function loadCountries() {
        fetch(`${API_URL}/countries`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('countriesTableBody');
                tbody.innerHTML = data.map(c => `
                    <tr>
                        <td><strong>${c.id}</strong></td>
                        <td>${c.name}</td>
                        <td><span class="badge bg-secondary">${c.continent}</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editCountry(${c.id}, '${c.name}', '${c.continent}')">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCountry(${c.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');

                const select = document.getElementById('authorCountry');
                select.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            }).catch(err => console.error("Error loading countries", err));
    }

    document.getElementById('countryForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const id = document.getElementById('countryId').value;
        const data = {
            name: document.getElementById('countryName').value,
            continent: document.getElementById('countryContinent').value
        };
        const url = id ? `${API_URL}/countries/${id}/edit` : `${API_URL}/countries/add`;

        fetch(url, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(res => {
            if(res.ok) { resetCountryForm(); loadCountries(); }
            else alert("Error saving country!");
        });
    });

    function editCountry(id, name, continent) {
        document.getElementById('countryId').value = id;
        document.getElementById('countryName').value = name;
        document.getElementById('countryContinent').value = continent;
        document.getElementById('countryFormTitle').innerText = 'Edit Country';
        document.getElementById('countrySaveBtn').innerText = 'Update Country';
        document.getElementById('countryCancelBtn').style.display = 'block';
    }

    function deleteCountry(id) {
        if(confirm("Are you sure you want to delete this country?")) {
            fetch(`${API_URL}/countries/${id}/delete`, { method: 'DELETE' })
                .then(res => {
                    if(res.ok) loadCountries();
                    else alert("Cannot delete country (might be in use by an author)!");
                });
        }
    }

    function resetCountryForm() {
        document.getElementById('countryForm').reset();
        document.getElementById('countryId').value = '';
        document.getElementById('countryFormTitle').innerText = 'Add New Country';
        document.getElementById('countrySaveBtn').innerText = 'Save Country';
        document.getElementById('countryCancelBtn').style.display = 'none';
    }


    function loadAuthors() {
        fetch(`${API_URL}/authors`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('authorsTableBody');
                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td><strong>${a.id}</strong></td>
                        <td>${a.name}</td>
                        <td>${a.surname}</td>
                        <td>${a.country?.name || a.countryName || 'N/A'}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editAuthor(${a.id}, '${a.name}', '${a.surname}', ${a.country?.id || a.countryId})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteAuthor(${a.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');

                const select = document.getElementById('bookAuthor');
                select.innerHTML = data.map(a => `<option value="${a.id}">${a.name} ${a.surname}</option>`).join('');
            }).catch(err => console.error("Error loading authors", err));
    }

    document.getElementById('authorForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const id = document.getElementById('authorId').value;
        const data = {
            name: document.getElementById('authorName').value,
            surname: document.getElementById('authorSurname').value,
            countryId: document.getElementById('authorCountry').value
        };
        const url = id ? `${API_URL}/authors/${id}/edit` : `${API_URL}/authors/add`;

        fetch(url, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(res => {
            if(res.ok) { resetAuthorForm(); loadAuthors(); }
            else alert("Error saving author!");
        });
    });

    function editAuthor(id, name, surname, countryId) {
        document.getElementById('authorId').value = id;
        document.getElementById('authorName').value = name;
        document.getElementById('authorSurname').value = surname;
        document.getElementById('authorCountry').value = countryId;
        document.getElementById('authorFormTitle').innerText = 'Edit Author';
        document.getElementById('authorSaveBtn').innerText = 'Update Author';
        document.getElementById('authorCancelBtn').style.display = 'block';
    }

    function deleteAuthor(id) {
        if(confirm("Are you sure you want to delete this author?")) {
            fetch(`${API_URL}/authors/${id}/delete`, { method: 'DELETE' })
                .then(res => {
                    if(res.ok) loadAuthors();
                    else alert("Cannot delete author (might have books associated)!");
                });
        }
    }

    function resetAuthorForm() {
        document.getElementById('authorForm').reset();
        document.getElementById('authorId').value = '';
        document.getElementById('authorFormTitle').innerText = 'Add New Author';
        document.getElementById('authorSaveBtn').innerText = 'Save Author';
        document.getElementById('authorCancelBtn').style.display = 'none';
    }

    function renderBooksTable(data) {
        const tbody = document.getElementById('booksTableBody');
        tbody.innerHTML = data.map(book => `
            <tr>
            <td>${book.name}</td>
            <td><span class="badge bg-secondary">${book.category}</span></td>
            <td>${book.author?.name ? book.author.name + ' ' + book.author.surname : (book.authorName || 'N/A')}</td>
            <td><strong>${book.availableCopies}</strong></td>
            <td>
            <span class="badge ${book.state === 'GOOD' ? 'bg-success' : 'bg-danger'}">${book.state}</span>
            </td>
            <td>
            <button class="btn btn-sm btn-primary" onclick="rentBook(${book.id})" ${(book.availableCopies <= 0 || book.state === 'BAD') ? 'disabled title="Cannot rent: No copies or BAD condition"' : ''}>Rent</button>
            <button class="btn btn-sm btn-warning" onclick="editBook(${book.id}, '${book.name}', '${book.category}', ${book.author?.id || book.authorId}, ${book.availableCopies}, '${book.state}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteBook(${book.id})" ${book.state === 'GOOD' ? 'disabled title="Only BAD books can be deleted"' : ''}>Delete</button>
            </td>
            </tr>
        `).join('');
    }

    function loadBooks() {
        fetch(`${API_URL}/books`)
            .then(res => res.json())
            .then(data => renderBooksTable(data));
    }

    document.getElementById('filterForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const a = document.getElementById('filterA').value;
        const b = document.getElementById('filterB').value;

        fetch(`${API_URL}/books/filter?a=${a}&b=${b}`)
            .then(res => res.json())
            .then(data => renderBooksTable(data))
            .catch(err => alert("Filtering error!"+err));
    });

    function clearFilter() {
        document.getElementById('filterForm').reset();
        loadBooks();
    }

    document.getElementById('bookForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const id = document.getElementById('bookId').value;
        const bookData = {
            name: document.getElementById('bookName').value,
            category: document.getElementById('bookCategory').value,
            authorId: document.getElementById('bookAuthor').value,
            availableCopies: document.getElementById('bookCopies').value,
            state: document.getElementById('bookState').value || 'GOOD'
        };

        const url = id ? `${API_URL}/books/${id}/edit` : `${API_URL}/books/add`;

        fetch(url, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bookData)
        }).then(response => {
            if(response.ok) {
                resetForm();
                const a = document.getElementById('filterA').value;
                const b = document.getElementById('filterB').value;
                if (a && b) fetch(`${API_URL}/books/filter?a=${a}&b=${b}`).then(res => res.json()).then(data => renderBooksTable(data));
                else loadBooks();
            } else alert("Error saving the book!");
        });
    });

    function editBook(id, name, category, authorId, copies, state) {
        document.getElementById('bookId').value = id;
        document.getElementById('bookName').value = name;
        document.getElementById('bookCategory').value = category;
        document.getElementById('bookAuthor').value = authorId;
        document.getElementById('bookCopies').value = copies;
        document.getElementById('stateDiv').style.display = 'block';
        document.getElementById('bookState').value = state;
        document.getElementById('formTitle').innerText = 'Edit Book';
        document.getElementById('saveBtn').innerText = 'Update Book';
        document.getElementById('cancelEditBtn').style.display = 'block';
    }

    function resetForm() {
        document.getElementById('bookForm').reset();
        document.getElementById('bookId').value = '';
        document.getElementById('stateDiv').style.display = 'none';
        document.getElementById('formTitle').innerText = 'Add New Book';
        document.getElementById('saveBtn').innerText = 'Save Book';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function rentBook(id) {
        fetch(`${API_URL}/books/${id}/rent`, { method: 'POST' }).then(res => {
            if (res.ok) {
                const a = document.getElementById('filterA').value;
                const b = document.getElementById('filterB').value;
                if (a && b) fetch(`${API_URL}/books/filter?a=${a}&b=${b}`).then(r => r.json()).then(data => renderBooksTable(data));
                else loadBooks();
            } else alert("Cannot rent this book!");
        });
    }

    function deleteBook(id) {
        if (confirm('Are you sure you want to delete this book?')) {
            fetch(`${API_URL}/books/${id}/delete`, { method: 'DELETE' }).then(res => {
                if (res.ok) {
                    const a = document.getElementById('filterA').value;
                    const b = document.getElementById('filterB').value;
                    if (a && b) fetch(`${API_URL}/books/filter?a=${a}&b=${b}`).then(r => r.json()).then(data => renderBooksTable(data));
                    else loadBooks();
                } else alert("Only books with BAD state can be deleted!");
            });
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
